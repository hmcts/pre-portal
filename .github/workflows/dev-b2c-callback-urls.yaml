name: Update B2C Callback URLs

on:
  workflow_dispatch:
  schedule:
    # Daily at 6PM Mon-Fri UTC
    - cron: '0 18 * * 1-5'

permissions:
  id-token: write
  contents: read

jobs:
  update_urls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.B2C_DEV_CREDENTIALS }}
          allow-no-subscriptions: true

      - run: |
          tenant_id=${{ secrets.B2C_TENANT_ID }}
          app_id=${{ secrets.B2C_CLIENT_ID }}
          pr_ids=($(gh pr list --json number | jq -r '.[].number'))

          redirect_uri=("https://localhost:4551/callback")

          for pr_number in "${pr_ids[@]}"
          do
          redirect_uri+=("https://pre-portal-pr-${pr_number}.dev.platform.hmcts.net/callback")
          done

          # Extra padding for new PRs created in the next 24 hours
          start=$((pr_ids[0] + 1))
          end=$((start + 50))
          for pr_number in $(seq $start $end)
          do
          redirect_uri+=("https://pre-portal-pr-${pr_number}.dev.platform.hmcts.net/callback")
          done

          echo "PR numbers from GitHub"
          gh pr list --json number | jq -r '.[].number'

          echo "PR numbers stored in pr_ids list"
          for pr_number in "${pr_ids[@]}"; do
          echo "pr_ids item -> $pr_number"
          done

          echo "STEP 3: start/end values"
          echo "start is: $start"
          echo "end is: $end"

          echo "Numbers seq"
          for pr_number in $(seq $start $end); do
          echo "seq item -> $pr_number"
          done

          echo "Redirect URIs:"
          for uri in "${redirect_uri[@]}"; do
          echo "redirect_uri item -> $uri"
          done

          az ad app update --id $app_id --web-redirect-uris "${redirect_uri[@]}"

          NETWORK_CLIENT_ID="d20a7462-f222-46b8-a363-d2e30eb274eb"
          if [ "$app_id" = "$NETWORK_CLIENT_ID" ]; then
          echo "CLIENT_ID_MATCH=true"
          else
          echo "CLIENT_ID_MATCH=false"
          fi
          echo "Azure redirect URIs now:"
          az ad app show --id "$app_id" --query "web.redirectUris" -o tsv
        env:
          REPO: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ github.token }}
